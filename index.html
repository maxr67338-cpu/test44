<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibe Time FM</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }
    body{
      background:#0a0a0a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      background-image: linear-gradient(180deg,#0a0a0a,#111,#0a0a0a);
    }
    .container{
      width:100%;
      max-width:900px;
      background:#111;
      border:2px solid #00eaff;
      border-radius:25px;
      padding:30px;
      box-shadow:0 0 40px #00eaff55;
    }
    h1{
      text-align:center;
      color:#00eaff;
      margin-bottom:20px;
      font-size:50px;
      text-shadow:0 0 15px #00eaff;
    }
    .player{
      background:#181818;
      border-radius:20px;
      padding:20px;
      margin-bottom:30px;
      text-align:center;
    }
    .live{
      color:#00ff66;
      font-size:18px;
      margin-bottom:15px;
    }
    audio{
      width:100%;
      margin-top:10px;
    }
    .wishbox{
      background:#181818;
      padding:25px;
      border-radius:20px;
    }
    .wishbox h2{
      color:#00eaff;
      margin-bottom:20px;
      text-align:center;
    }
    input, textarea{
      width:100%;
      margin-bottom:15px;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#222;
      color:white;
      font-size:16px;
    }
    textarea{
      resize:none;
      height:120px;
    }
    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#00eaff;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }
    button:hover{
      background:white;
      transform:scale(1.02);
    }
    .footer{
      text-align:center;
      margin-top:20px;
      color:#888;
      font-size:14px;
    }

    /* === TEAM AREA === */
    .team-btn-wrap{
      text-align:right;
      margin-bottom:20px;
    }
    .team-open-btn{
      width:auto;
      padding:10px 22px;
      font-size:15px;
      background:#1a1a1a;
      color:#00eaff;
      border:2px solid #00eaff44;
      border-radius:12px;
    }
    .team-open-btn:hover{
      background:#00eaff;
      color:black;
      transform:scale(1.02);
    }

    .overlay{
      display:none;
      position:fixed;
      inset:0;
      background:#000000cc;
      z-index:999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }
    .overlay.show{ display:flex; }

    .modal{
      background:#111;
      border:2px solid #00eaff;
      border-radius:25px;
      padding:30px;
      width:100%;
      max-width:700px;
      max-height:90vh;
      overflow-y:auto;
      box-shadow:0 0 40px #00eaff55;
      position:relative;
    }
    .modal h2{
      color:#00eaff;
      text-align:center;
      margin-bottom:20px;
      font-size:26px;
    }
    .close-btn{
      position:absolute;
      top:16px; right:20px;
      background:transparent;
      color:#888;
      font-size:22px;
      width:auto;
      padding:0;
      border:none;
      cursor:pointer;
    }
    .close-btn:hover{ color:white; background:transparent; transform:none; }

    .pw-error{
      color:#ff4466;
      font-size:14px;
      text-align:center;
      margin-bottom:12px;
      display:none;
    }

    .wish-item{
      background:#1c1c1c;
      border:1px solid #2a2a2a;
      border-radius:14px;
      padding:16px;
      margin-bottom:12px;
      position:relative;
    }
    .wish-name{
      color:#00eaff;
      font-weight:bold;
      font-size:15px;
      margin-bottom:4px;
    }
    .wish-time{
      color:#555;
      font-size:12px;
      margin-bottom:8px;
    }
    .wish-msg{
      color:#ccc;
      font-size:14px;
      line-height:1.5;
    }
    .del-btn{
      position:absolute;
      top:12px; right:12px;
      background:#ff446622;
      border:1px solid #ff446644;
      color:#ff4466;
      border-radius:8px;
      padding:4px 12px;
      font-size:12px;
      font-weight:bold;
      width:auto;
      cursor:pointer;
      transition:0.2s;
    }
    .del-btn:hover{ background:#ff446644; transform:none; }

    .empty{
      text-align:center;
      color:#555;
      padding:30px 0;
      font-size:15px;
    }

    .count-badge{
      display:inline-block;
      background:#00eaff;
      color:#000;
      border-radius:50px;
      padding:1px 8px;
      font-size:12px;
      font-weight:bold;
      margin-left:6px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Vibe Time FM</h1>

    <!-- Team Button -->
    <div class="team-btn-wrap">
      <button class="team-open-btn" onclick="openTeamArea()">🔐 Team-Area <span class="count-badge" id="badgeCount">0</span></button>
    </div>

    <div class="player">
      <div class="live">🔴 LIVE STREAM</div>
      <p>Jetzt Vibe Time FM hören</p>
      <audio controls autoplay>
        <source src="https://fdsfdsfdsf.radio12345.com/intro.mp3" type="audio/mp3">
      </audio>
    </div>

    <div class="wishbox">
      <h2>🎵 Große Wunschbox</h2>
      <form id="wishForm">
        <input type="text" id="name" placeholder="Dein Name" required>
        <textarea id="message" placeholder="Gruß + Songwunsch..." required></textarea>
        <button type="submit">Wunsch senden</button>
      </form>
    </div>

    <div class="footer">© 2026 Vibe Time FM</div>
  </div>

  <!-- Team Area Overlay -->
  <div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="modal">
      <button class="close-btn" onclick="closeTeamArea()">✕</button>

      <!-- Login -->
      <div id="loginView">
        <h2>🔐 Team-Area</h2>
        <p style="text-align:center;color:#888;margin-bottom:18px;">Nur für autorisierte Teammitglieder</p>
        <div class="pw-error" id="pwError">Falsches Passwort. Bitte erneut versuchen.</div>
        <input type="password" id="teamPw" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">Einloggen</button>
      </div>

      <!-- Dashboard -->
      <div id="dashView" style="display:none;">
        <h2>📋 Eingegangene Wünsche</h2>
        <div id="wishList"></div>
        <button style="background:#333;color:#888;margin-top:10px;" onclick="doLogout()">Ausloggen</button>
      </div>
    </div>
  </div>

  <script>
    const PASS = 'vibetimefm8000';
    let authed = false;
    let wishes = JSON.parse(localStorage.getItem('vtfm_wishes') || '[]');

    function saveWishes(){
      localStorage.setItem('vtfm_wishes', JSON.stringify(wishes));
      document.getElementById('badgeCount').textContent = wishes.length;
    }

    // Init badge
    document.getElementById('badgeCount').textContent = wishes.length;

    // Wunschbox absenden
    document.getElementById('wishForm').addEventListener('submit', function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const msg = document.getElementById('message').value.trim();
      if(!name || !msg) return;
      const now = new Date();
      const time = now.toLocaleDateString('de-DE') + ', ' + now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';
      wishes.unshift({ id: Date.now(), name, msg, time });
      saveWishes();
      alert('Wunsch erfolgreich gesendet!\n\nName: ' + name + '\nNachricht: ' + msg);
      this.reset();
    });

    function openTeamArea(){
      document.getElementById('overlay').classList.add('show');
      if(authed) showDash();
      else showLogin();
    }

    function closeTeamArea(){
      document.getElementById('overlay').classList.remove('show');
    }

    function overlayClick(e){
      if(e.target === document.getElementById('overlay')) closeTeamArea();
    }

    function showLogin(){
      document.getElementById('loginView').style.display='block';
      document.getElementById('dashView').style.display='none';
      document.getElementById('pwError').style.display='none';
      document.getElementById('teamPw').value='';
    }

    function showDash(){
      document.getElementById('loginView').style.display='none';
      document.getElementById('dashView').style.display='block';
      renderWishes();
    }

    function doLogin(){
      const pw = document.getElementById('teamPw').value;
      if(pw === PASS){
        authed = true;
        document.getElementById('pwError').style.display='none';
        showDash();
      } else {
        document.getElementById('pwError').style.display='block';
        document.getElementById('teamPw').value='';
      }
    }

    function doLogout(){
      authed = false;
      showLogin();
    }

    function renderWishes(){
      const list = document.getElementById('wishList');
      if(wishes.length === 0){
        list.innerHTML = '<div class="empty">Noch keine Wünsche eingegangen.</div>';
        return;
      }
      list.innerHTML = wishes.map(w => `
        <div class="wish-item">
          <div class="wish-name">👤 ${esc(w.name)}</div>
          <div class="wish-time">🕐 ${esc(w.time)}</div>
          <div class="wish-msg">💬 ${esc(w.msg)}</div>
          <button class="del-btn" onclick="deleteWish(${w.id})">✕ Löschen</button>
        </div>
      `).join('');
    }

    function deleteWish(id){
      if(!confirm('Diesen Wunsch wirklich löschen?')) return;
      wishes = wishes.filter(w => w.id !== id);
      saveWishes();
      renderWishes();
    }

    function esc(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
</html>
