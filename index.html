<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibe Time FM</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
    body{
      background:#0a0a0a; color:white; min-height:100vh;
      display:flex; justify-content:center; align-items:center;
      padding:30px;
      background-image: linear-gradient(180deg,#0a0a0a,#111,#0a0a0a);
    }
    .container{
      width:100%; max-width:900px; background:#111;
      border:2px solid #00eaff; border-radius:25px; padding:30px;
      box-shadow:0 0 40px #00eaff55;
    }
    h1{ text-align:center; color:#00eaff; margin-bottom:20px; font-size:50px; text-shadow:0 0 15px #00eaff; }
    .player{ background:#181818; border-radius:20px; padding:20px; margin-bottom:30px; text-align:center; }
    .live{ color:#00ff66; font-size:18px; margin-bottom:15px; }
    audio{ width:100%; margin-top:10px; }
    button{
      padding:15px; border:none; border-radius:12px;
      background:#00eaff; color:black; font-size:18px; font-weight:bold;
      cursor:pointer; transition:0.3s;
    }
    button:hover{ background:white; transform:scale(1.02); }
    .footer{ text-align:center; margin-top:20px; color:#888; font-size:14px; }
    .team-btn-wrap{ text-align:right; margin-bottom:20px; }
    .team-open-btn{
      padding:10px 22px; font-size:15px;
      background:#1a1a1a; color:#00eaff; border:2px solid #00eaff44; border-radius:12px;
    }
    .overlay{
      display:none; position:fixed; inset:0; background:#000000cc;
      z-index:999; justify-content:center; align-items:center; padding:20px;
    }
    .overlay.show{ display:flex; }
    .modal{
      background:#111; border:2px solid #00eaff; border-radius:25px; padding:30px;
      width:100%; max-width:720px; max-height:90vh; overflow-y:auto;
      box-shadow:0 0 40px #00eaff55; position:relative;
    }
    .modal h2{ color:#00eaff; text-align:center; margin-bottom:20px; }
    .close-btn{
      position:absolute; top:16px; right:20px; background:transparent;
      color:#888; font-size:22px; cursor:pointer;
    }
    .pw-error{ color:#ff4466; text-align:center; margin:10px 0; display:none; }
    .modal-tabs{ display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
    .modal-tab{
      flex:1; padding:10px; border-radius:10px; border:1.5px solid #00eaff33;
      background:#1a1a1a; color:#888; cursor:pointer;
    }
    .modal-tab.active{ background:#00eaff; color:#000; }
    .modal-panel{ display:none; }
    .modal-panel.active{ display:block; }
    .wish-item, .profile-card{
      background:#1c1c1c; border:1px solid #2a2a2a; border-radius:14px;
      padding:16px; margin-bottom:12px;
    }
    .del-btn{
      background:#ff446622; color:#ff4466; border:none; padding:4px 10px; border-radius:6px; cursor:pointer;
    }
    .count-badge{
      background:#00eaff; color:#000; border-radius:50px; padding:1px 8px; font-size:12px;
    }
    .new-pw-box{
      background:#222; padding:15px; border-radius:10px; margin:15px 0; font-family:monospace;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Vibe Time FM</h1>
  <div class="team-btn-wrap">
    <button class="team-open-btn" onclick="openTeamArea()">🔐 Team-Area <span class="count-badge" id="badgeCount">0</span></button>
  </div>

  <div class="player">
    <div class="live">🔴 LIVE STREAM</div>
    <p>Jetzt Vibe Time FM hören</p>
    <div style="margin:15px 0; display:flex; gap:10px; justify-content:center;">
      <button onclick="switchStream(0)" id="btnMain" class="modal-tab active">🎵 Mainstream</button>
      <button onclick="switchStream(1)" id="btnTest" class="modal-tab">🧪 Teststream</button>
    </div>
    <audio controls autoplay id="mainAudio">
      <source src="https://stream.laut.fm/vibetime" type="audio/mpeg">
    </audio>
    <audio controls id="testAudio" style="display:none;">
      <source src="http://uk25freenew.listen2myradio.com:8476/stream" type="audio/mpeg">
    </audio>
  </div>

  <div class="wishbox">
    <h2>🎵 Große Wunschbox</h2>
    <form id="wishForm">
      <input type="text" id="name" placeholder="Dein Name" required>
      <textarea id="message" placeholder="Gruß + Songwunsch..." required></textarea>
      <button type="submit">Wunsch senden</button>
    </form>
  </div>
  <div class="footer">© 2026 Vibe Time FM</div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeTeamArea()">✕</button>

    <div id="loginView">
      <h2>🔐 Team-Login</h2>
      <p style="text-align:center;color:#888;margin-bottom:18px;">Nur für Teammitglieder</p>
      <div class="pw-error" id="pwError">Falsches Passwort.</div>
      <input type="text" id="loginName" placeholder="Dein Name (z.B. Marco)" style="margin-bottom:10px;">
      <input type="password" id="teamPw" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">Einloggen</button>
    </div>

    <div id="dashView" style="display:none;">
      <h2>📋 Team-Bereich <span id="currentUserDisplay" style="font-size:16px;color:#00ff88;"></span></h2>
      
      <div class="modal-tabs">
        <div class="modal-tab active" id="tabWishes" onclick="switchModalTab('wishes')">🎵 Wünsche</div>
        <div class="modal-tab" id="tabJingles" onclick="switchModalTab('jingles')">🎙️ Jingles</div>
        <div class="modal-tab" id="tabProfiles" onclick="switchModalTab('profiles')">👥 Team-Profile</div>
      </div>

      <div class="modal-panel active" id="panelWishes"><div id="wishList"></div></div>
      <div class="modal-panel" id="panelJingles">Jingles-Bereich (wie zuvor)</div>
      
      <div class="modal-panel" id="panelProfiles">
        <h3>👥 Team-Mitglieder</h3>
        <div id="profilesList"></div>
        <button onclick="addNewProfile()" style="margin-top:15px;">+ Neues Profil erstellen</button>
      </div>

      <button style="background:#333;color:#888;margin-top:20px;" onclick="doLogout()">Ausloggen</button>
    </div>
  </div>
</div>

<script>
  const ADMIN_PASS = 'vibetimefm8000';
  let currentUser = null;
  let wishes = JSON.parse(localStorage.getItem('vtfm_wishes') || '[]');
  let profiles = JSON.parse(localStorage.getItem('vtfm_profiles') || '[]');

  // Marco als Admin anlegen
  if (!profiles.some(p => p.name === "Marco")) {
    profiles.unshift({
      id: Date.now(),
      name: "Marco",
      role: "Gründer / Hauptmoderator",
      joined: "Mai 2026",
      experience: "Sehr erfahren",
      notes: "Admin",
      bio: "Gründer von Vibe Time FM",
      password: ADMIN_PASS,
      isAdmin: true
    });
    localStorage.setItem('vtfm_profiles', JSON.stringify(profiles));
  }

  function saveData() {
    localStorage.setItem('vtfm_wishes', JSON.stringify(wishes));
    localStorage.setItem('vtfm_profiles', JSON.stringify(profiles));
    document.getElementById('badgeCount').textContent = wishes.length;
  }

  function doLogin() {
    const name = document.getElementById('loginName').value.trim();
    const pw = document.getElementById('teamPw').value;
    const user = profiles.find(p => p.name.toLowerCase() === name.toLowerCase() && p.password === pw);

    if (user) {
      currentUser = user;
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('dashView').style.display = 'block';
      document.getElementById('currentUserDisplay').textContent = `| Angemeldet als: ${user.name}`;
      renderProfiles();
      renderWishes();
    } else {
      document.getElementById('pwError').style.display = 'block';
    }
  }

  function doLogout() {
    currentUser = null;
    document.getElementById('dashView').style.display = 'none';
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('loginName').value = '';
    document.getElementById('teamPw').value = '';
  }

  function addNewProfile() {
    if (!currentUser || !currentUser.isAdmin) {
      alert("Nur der Admin (Marco) darf neue Profile erstellen.");
      return;
    }
    const name = prompt("Name des neuen Teammitglieds:");
    if (!name) return;

    const tempPassword = 'vtfm' + Math.floor(1000 + Math.random() * 9000);

    profiles.push({
      id: Date.now(),
      name: name,
      role: "Azubi / Moderator",
      joined: new Date().toLocaleDateString('de-DE'),
      experience: "",
      notes: "",
      bio: "",
      password: tempPassword,
      isAdmin: false
    });

    saveData();
    renderProfiles();

    alert(`✅ Profil für ${name} erstellt!\n\nTemporäres Passwort: ${tempPassword}\n\nKopiere es und sende es dem Teammitglied.`);
  }

  function renderProfiles() {
    const list = document.getElementById('profilesList');
    list.innerHTML = profiles.map(p => `
      <div class="profile-card">
        <strong>${p.name}</strong> ${p.isAdmin ? '(Admin)' : ''}
        <p><strong>Rolle:</strong> ${p.role}</p>
        <p><strong>Passwort:</strong> ${currentUser.isAdmin ? p.password : '••••••••'}</p>
        ${currentUser.isAdmin || currentUser.name === p.name ? 
          `<button onclick="editProfile(${p.id})">Bearbeiten</button>` : ''}
        ${currentUser.isAdmin ? `<button class="del-btn" onclick="deleteProfile(${p.id})">Löschen</button>` : ''}
      </div>
    `).join('');
  }

  function editProfile(id) {
    const profile = profiles.find(p => p.id === id);
    if (!profile) return;
    if (!currentUser.isAdmin && currentUser.name !== profile.name) {
      alert("Du darfst nur dein eigenes Profil bearbeiten.");
      return;
    }

    const newRole = prompt("Neue Rolle:", profile.role);
    if (newRole) profile.role = newRole;

    const newBio = prompt("Kurze Bio:", profile.bio);
    if (newBio !== null) profile.bio = newBio;

    saveData();
    renderProfiles();
  }

  function deleteProfile(id) {
    if (!currentUser.isAdmin) return;
    if (!confirm("Profil wirklich löschen?")) return;
    profiles = profiles.filter(p => p.id !== id);
    saveData();
    renderProfiles();
  }

  // Rest der Funktionen (Wünsche, Streams, etc.)
  function switchModalTab(tab) { /* ... wie vorher */ }
  function renderWishes() { /* ... wie vorher */ }
  function deleteWish(id) { /* ... */ }
  function switchStream(n) { /* ... */ }
  function openTeamArea() { /* ... */ }
  function overlayClick(e) { if(e.target.id === 'overlay') closeTeamArea(); }
  function closeTeamArea() { document.getElementById('overlay').classList.remove('show'); }

  document.getElementById('wishForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Wish-Logik wie vorher
    alert("Wunsch gesendet!");
    this.reset();
  });

  saveData();
</script>
</body>
</html>
